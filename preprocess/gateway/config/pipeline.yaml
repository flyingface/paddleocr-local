# 编排规则 (Pipeline Configuration)
#
# 改这个文件,Gateway 会自动加载新规则(开发模式无需重启)。
# 生产模式用 PUT /config/pipeline 热更新。

# 默认 OCR 路由(没分类结果时)
default_ocr:
  service: pp-ocrv6
  mode: general

# Pipeline 顺序
pipeline:
  # ---- 矫正阶段 ----
  - stage: correction
    service: http://paddleocr-preprocess-correction:8080
    on_missing: skip      # 服务挂了跳过,继续走后续 stage
    timeout_ms: 10000

  # ---- 分类阶段 ----
  - stage: classify
    service: http://paddleocr-preprocess-classify:8080
    on_missing: skip      # 分类服务没部署时跳过
    timeout_ms: 5000

  # ---- 路由决策(纯逻辑) ----
  - stage: route
    type: ocr_router
    on_missing: skip
    timeout_ms: 100

# 路由规则(L1 分类 → OCR 服务映射)
# 在 app.py 的 decide_ocr_route() 里实现,这里只是文档化
routing_table:
  id_card:            { service: pp-ocrv6,         mode: structured_card }
  passport:           { service: pp-ocrv6,         mode: structured_card }
  driving_license:    { service: pp-ocrv6,         mode: structured_card }
  bank_card:          { service: pp-ocrv6,         mode: structured_card }
  invoice:            { service: paddleocr-vl-api, mode: layout_parsing }
  receipt:            { service: paddleocr-vl-api, mode: layout_parsing }
  contract:           { service: paddleocr-vl-api, mode: layout_parsing }
  report:             { service: paddleocr-vl-api, mode: layout_parsing }
  menu:               { service: pp-ocrv6,         mode: menu_translate }
  handwriting:        { service: paddleocr-vl-api, mode: layout_parsing }
  default:            { service: pp-ocrv6,         mode: general }
